services:
  - type: cron
    name: pulse-daily
    runtime: python
    schedule: "0 4 * * *"   # 04:00 UTC = 05:00 WAT (West Africa Time, UTC+1)
    buildCommand: "pip install uv && uv sync --frozen"
    startCommand: "uv run python -m src.runner"
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: NEWS_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        sync: false
      - key: DIGEST_TO_EMAIL
        sync: false
